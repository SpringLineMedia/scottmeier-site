<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Page not found · Scott Meier</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <style>
    :root {
      --paper: #FCFBF9; --ink: #14131A; --muted: #6C6B75; --line: rgba(20,18,28,0.22);
      --serif: ui-serif, "New York", "Iowan Old Style", Georgia, "Times New Roman", serif;
      --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center; text-align: center;
      background: var(--paper); color: var(--ink); padding: 24px; font-family: var(--sans); line-height: 1.6;
    }
    .code { font-family: var(--serif); font-size: clamp(4.5rem, 17vw, 9rem); font-weight: 600; line-height: 1; letter-spacing: -.02em; }
    h1 { font-family: var(--serif); font-weight: 600; font-size: clamp(1.3rem, 4vw, 1.9rem); margin: 10px 0 12px; }
    p { color: var(--muted); margin: 0 0 32px; }
    .btn {
      display: inline-flex; align-items: center; gap: .5em; text-decoration: none;
      font: 600 0.8rem/1 var(--sans); letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--paper); background: var(--ink); border: 1px solid var(--ink); border-radius: 2px; padding: 15px 26px;
      transition: background .25s ease, color .25s ease;
    }
    .btn:hover { background: transparent; color: var(--ink); }
  </style>
</head>
<body>
  <main>
    <div class="code">404</div>
    <h1>This page wandered off.</h1>
    <p>Even the best‑made plush gets lost sometimes. Let's get you home.</p>
    <a class="btn" href="/">Back to scottmeier.com</a>
  </main>
</body>
</html>
